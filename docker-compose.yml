services:

  api:
    build: .
    container_name: sensor_api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "sleep 15 && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - sensor_network

  mysql:
    image: mysql:8.0
    container_name: sensor_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - sensor_network

  adminer:
    image: adminer
    container_name: sensor_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sensor_network

volumes:
  mysql_data:

networks:
  sensor_network:
    driver: bridge